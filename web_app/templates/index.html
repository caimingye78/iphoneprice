<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone价格监控系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.3.0/build/global/luxon.min.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --info-color: #17a2b8;
            --dark-color: #343a40;
            --light-color: #f8f9fa;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        
        .navbar-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .dashboard-header {
            padding: 2rem 0;
            text-align: center;
            color: white;
        }
        
        .dashboard-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .dashboard-header .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .stat-card {
            padding: 1.5rem;
            text-align: center;
        }
        
        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            opacity: 0.8;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .alert-item {
            border-left: 4px solid;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .alert-buy { border-left-color: var(--success-color); background: rgba(40, 167, 69, 0.1); }
        .alert-sell { border-left-color: var(--danger-color); background: rgba(220, 53, 69, 0.1); }
        .alert-cost { border-left-color: var(--info-color); background: rgba(23, 162, 184, 0.1); }
        .alert-price { border-left-color: var(--warning-color); background: rgba(255, 193, 7, 0.1); }
        
        .price-table {
            font-size: 0.9rem;
        }
        
        .price-table td {
            vertical-align: middle;
        }
        
        .price-change {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.8rem;
        }
        
        .price-up { background: rgba(40, 167, 69, 0.2); color: var(--success-color); }
        .price-down { background: rgba(220, 53, 69, 0.2); color: var(--danger-color); }
        
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
        
        .strategy-card {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border: none;
            border-radius: 15px;
        }
        
        .strategy-badge {
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }
        
        .monitor-controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .time-display {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #6c757d;
        }
        
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
        }
        
        .custom-toast {
            min-width: 300px;
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .websocket-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-connected { background-color: var(--success-color); animation: pulse 2s infinite; }
        .status-disconnected { background-color: var(--danger-color); }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-glass">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-mobile-alt me-2"></i>
                <strong>iPhone价格监控系统</strong>
            </a>
            
            <div class="websocket-status ms-auto me-3">
                <span class="status-dot" id="wsStatusDot"></span>
                <span id="wsStatusText">连接中...</span>
            </div>
            
            <div class="time-display" id="currentTime">
                正在加载...
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="container py-4">
        <!-- 仪表板头部 -->
        <div class="dashboard-header">
            <h1><i class="fas fa-chart-line me-3"></i>iPhone价格智能监控仪表板</h1>
            <p class="subtitle">实时监控、智能策略、自动预警 - 让手机消费更精明</p>
        </div>

        <!-- 统计卡片行 -->
        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <div class="glass-card stat-card">
                    <div class="stat-icon text-primary">
                        <i class="fas fa-money-bill-wave"></i>
                    </div>
                    <div class="stat-value" id="priceCount">0</div>
                    <div class="stat-label">价格数据点</div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="glass-card stat-card">
                    <div class="stat-icon text-success">
                        <i class="fas fa-bell"></i>
                    </div>
                    <div class="stat-value" id="alertCount">0</div>
                    <div class="stat-label">预警总数</div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="glass-card stat-card">
                    <div class="stat-icon text-warning">
                        <i class="fas fa-chart-bar"></i>
                    </div>
                    <div class="stat-value" id="recentAlerts">0</div>
                    <div class="stat-label">24小时预警</div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="glass-card stat-card">
                    <div class="stat-icon text-info">
                        <i class="fas fa-calculator"></i>
                    </div>
                    <div class="stat-value" id="monthlyCost">¥0</div>
                    <div class="stat-label">最优月成本</div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- 左侧：价格监控 -->
            <div class="col-lg-8">
                <!-- 价格图表 -->
                <div class="glass-card mb-4">
                    <div class="card-header bg-transparent border-bottom">
                        <h5 class="mb-0"><i class="fas fa-chart-line me-2"></i>价格趋势图</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="priceChart"></canvas>
                        </div>
                        <div class="mt-3">
                            <select class="form-select form-select-sm" id="chartType" style="width: auto;">
                                <option value="line">折线图</option>
                                <option value="bar">柱状图</option>
                                <option value="scatter">散点图</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 实时价格表 -->
                <div class="glass-card mb-4">
                    <div class="card-header bg-transparent border-bottom d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="fas fa-table me-2"></i>实时价格监控</h5>
                        <div class="monitor-controls">
                            <button class="btn btn-sm btn-primary" onclick="fetchPrices()">
                                <i class="fas fa-sync-alt"></i> 刷新
                            </button>
                            <select class="form-select form-select-sm" id="platformFilter" style="width: auto;">
                                <option value="">所有平台</option>
                                <option value="xianyu">闲鱼</option>
                                <option value="zhuanzhuan">转转</option>
                                <option value="aihuishou">爱回收</option>
                            </select>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover price-table">
                                <thead>
                                    <tr>
                                        <th>机龄</th>
                                        <th>平台</th>
                                        <th>价格</th>
                                        <th>成色</th>
                                        <th>变化</th>
                                        <th>时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="priceTableBody">
                                    <!-- 价格数据将通过JavaScript动态加载 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：策略和预警 -->
            <div class="col-lg-4">
                <!-- 最优策略 -->
                <div class="glass-card mb-4 strategy-card">
                    <div class="card-header bg-transparent border-bottom">
                        <h5 class="mb-0"><i class="fas fa-bullseye me-2"></i>最优策略推荐</h5>
                    </div>
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <span class="badge bg-success strategy-badge me-2">推荐</span>
                            <span class="text-muted" id="strategyTime">刚刚更新</span>
                        </div>
                        
                        <div class="mb-3">
                            <div class="d-flex justify-content-between mb-2">
                                <span>月成本目标:</span>
                                <strong id="targetCost">¥90/月</strong>
                            </div>
                            <input type="range" class="form-range" id="costSlider" min="50" max="150" value="90" oninput="updateTargetCost(this.value)">
                        </div>
                        
                        <div class="strategy-details" id="strategyDetails">
                            <!-- 策略详情将通过JavaScript动态加载 -->
                            <div class="text-center py-3">
                                <div class="loading-spinner"></div>
                                <div class="text-muted mt-2">计算中...</div>
                            </div>
                        </div>
                        
                        <button class="btn btn-primary w-100 mt-3" onclick="calculateStrategy()">
                            <i class="fas fa-calculator me-2"></i>重新计算策略
                        </button>
                    </div>
                </div>

                <!-- 实时预警 -->
                <div class="glass-card mb-4">
                    <div class="card-header bg-transparent border-bottom d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="fas fa-bell me-2"></i>实时预警</h5>
                        <div class="monitor-controls">
                            <button class="btn btn-sm btn-outline-danger" onclick="clearAlerts()">
                                <i class="fas fa-trash"></i> 清空
                            </button>
                        </div>
                    </div>
                    <div class="card-body" style="max-height: 400px; overflow-y: auto;">
                        <div id="alertsContainer">
                            <!-- 预警将通过JavaScript动态加载 -->
                            <div class="text-center py-3">
                                <div class="loading-spinner"></div>
                                <div class="text-muted mt-2">加载预警...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 监控控制 -->
                <div class="glass-card">
                    <div class="card-header bg-transparent border-bottom">
                        <h5 class="mb-0"><i class="fas fa-cog me-2"></i>监控控制</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">监控频率</label>
                            <select class="form-select" id="monitorInterval">
                                <option value="300">5分钟</option>
                                <option value="1800" selected>30分钟</option>
                                <option value="3600">1小时</option>
                                <option value="7200">2小时</option>
                                <option value="14400">4小时</option>
                            </select>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button class="btn btn-success" id="startMonitorBtn" onclick="startMonitoring()">
                                <i class="fas fa-play me-2"></i>启动监控
                            </button>
                            <button class="btn btn-danger" id="stopMonitorBtn" onclick="stopMonitoring()" disabled>
                                <i class="fas fa-stop me-2"></i>停止监控
                            </button>
                        </div>
                        
                        <div class="mt-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="emailAlerts">
                                <label class="form-check-label" for="emailAlerts">邮件预警</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="pushAlerts">
                                <label class="form-check-label" for="pushAlerts">推送通知</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 应用JS -->
    <script>
        // 全局变量
        let ws = null;
        let priceChart = null;
        let currentStrategy = null;
        let monitorActive = false;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateTime();
            setInterval(updateTime, 1000);
            
            initWebSocket();
            fetchDashboardData();
            initPriceChart();
            
            // 初始加载
            fetchPrices();
            fetchAlerts();
            calculateStrategy();
        });
        
        // 更新时间显示
        function updateTime() {
            const now = luxon.DateTime.now();
            document.getElementById('currentTime').textContent = now.toFormat('yyyy-MM-dd HH:mm:ss');
        }
        
        // 初始化WebSocket
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = function() {
                updateWebSocketStatus(true);
                ws.send(JSON.stringify({ type: 'subscribe', channel: 'monitor' }));
            };
            
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
            
            ws.onclose = function() {
                updateWebSocketStatus(false);
                // 5秒后重连
                setTimeout(initWebSocket, 5000);
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket错误:', error);
            };
        }
        
        // 更新WebSocket状态
        function updateWebSocketStatus(connected) {
            const dot = document.getElementById('wsStatusDot');
            const text = document.getElementById('wsStatusText');
            
            if (connected) {
                dot.className = 'status-dot status-connected';
                text.textContent = '已连接';
            } else {
                dot.className = 'status-dot status-disconnected';
                text.textContent = '断开连接';
            }
        }
        
        // 处理WebSocket消息
        function handleWebSocketMessage(data) {
            switch(data.type) {
                case 'price_update':
                    updatePriceTable(data.prices);
                    break;
                case 'alert':
                    addAlert(data.alert);
                    break;
                case 'strategy_update':
                    updateStrategy(data.strategy);
                    break;
                case 'status':
                    updateMonitorStatus(data.status);
                    break;
            }
        }
        
        // 获取仪表板数据
        async function fetchDashboardData() {
            try {
                const response = await fetch('/api/stats');
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('priceCount').textContent = result.stats.price_count.toLocaleString();
                    document.getElementById('alertCount').textContent = result.stats.alert_count.toLocaleString();
                    document.getElementById('recentAlerts').textContent = result.stats.recent_alerts_24h.toLocaleString();
                }
            } catch (error) {
                console.error('获取仪表板数据失败:', error);
            }
        }
        
        // 初始化价格图表
        function initPriceChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'iPhone 18价格趋势',
                        data: [],
                        borderColor: '#007bff',
                        backgroundColor: 'rgba(0, 123, 255, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        }
                    },
                    scales: {
                        x: {
                            display: true,
                            title: {
                                display: true,
                                text: '时间'
                            }
                        },
                        y: {
                            display: true,
                            title: {
                                display: true,
                                text: '价格 (¥)'
                            }
                        }
                    }
                }
            });
        }
        
        // 获取价格数据
        async function fetchPrices() {
            const platform = document.getElementById('platformFilter').value;
            
            try {
                let url = '/api/prices?limit=50';
                if (platform) {
                    url += `&platform=${platform}`;
                }
                
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.success) {
                    updatePriceTable(result.data);
                    updatePriceChart(result.data);
                }
            } catch (error) {
                console.error('获取价格数据失败:', error);
                showToast('获取价格数据失败', 'danger');
            }
        }
        
        // 更新价格表格
        function updatePriceTable(prices) {
            const tbody = document.getElementById('priceTableBody');
            tbody.innerHTML = '';
            
            prices.forEach(price => {
                const time = luxon.DateTime.fromISO(price.timestamp);
                const timeStr = time.toRelative();
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${price.age_months === 0 ? '全新' : `${price.age_months}个月`}</td>
                    <td><span class="badge bg-secondary">${price.platform || price.source}</span></td>
                    <td><strong>¥${price.price.toLocaleString()}</strong></td>
                    <td>${price.condition}</td>
                    <td><span class="price-change ${Math.random() > 0.5 ? 'price-up' : 'price-down'}">${Math.random() > 0.5 ? '+' : ''}${(Math.random() * 5).toFixed(1)}%</span></td>
                    <td class="text-muted">${timeStr}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="showPriceDetails(${price.id})">
                            <i class="fas fa-info-circle"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // 更新价格图表
        function updatePriceChart(prices) {
            if (!priceChart) return;
            
            // 按时间分组
            const grouped = {};
            prices.forEach(price => {
                const date = luxon.DateTime.fromISO(price.timestamp).toFormat('MM-dd HH:mm');
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(price.price);
            });
            
            const labels = Object.keys(grouped).slice(0, 20); // 显示最近20个点
            const avgPrices = labels.map(label => {
                const prices = grouped[label];
                return prices.reduce((a, b) => a + b, 0) / prices.length;
            });
            
            priceChart.data.labels = labels;
            priceChart.data.datasets[0].data = avgPrices;
            priceChart.update();
        }
        
        // 获取预警数据
        async function fetchAlerts() {
            try {
                const response = await fetch('/api/alerts?limit=10');
                const result = await response.json();
                
                if (result.success) {
                    updateAlertsContainer(result.data);
                }
            } catch (error) {
                console.error('获取预警数据失败:', error);
            }
        }
        
        // 更新预警容器
        function updateAlertsContainer(alerts) {
            const container = document.getElementById('alertsContainer');
            
            if (alerts.length === 0) {
                container.innerHTML = '<div class="text-center py-3 text-muted">暂无预警</div>';
                return;
            }
            
            container.innerHTML = '';
            
            alerts.forEach(alert => {
                const alertDiv = document.createElement('div');
                alertDiv.className = `alert-item alert-${getAlertTypeClass(alert.alert_type)}`;
                
                const time = luxon.DateTime.fromISO(alert.timestamp);
                const timeStr = time.toRelative();
                
                alertDiv.innerHTML = `
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <strong>${alert.title}</strong>
                        <span class="badge bg-${getPriorityBadgeClass(alert.priority)}">P${alert.priority}</span>
                    </div>
                    <div class="mb-2">${alert.message}</div>
                    <div class="d-flex justify-content-between align-items-center">
                        <small class="text-muted">${timeStr}</small>
                        ${alert.action ? `<button class="btn btn-sm btn-outline-primary" onclick="handleAlertAction('${alert.id}')">操作</button>` : ''}
                    </div>
                `;
                
                container.appendChild(alertDiv);
            });
        }
        
        // 添加单个预警
        function addAlert(alertData) {
            const container = document.getElementById('alertsContainer');
            
            // 如果容器显示"暂无预警"，先清空
            if (container.querySelector('.text-muted')) {
                container.innerHTML = '';
            }
            
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert-item alert-${getAlertTypeClass(alertData.alert_type)}`;
            
            const timeStr = '刚刚';
            
            alertDiv.innerHTML = `
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <strong>${alertData.title}</strong>
                    <span class="badge bg-${getPriorityBadgeClass(alertData.priority)}">P${alertData.priority}</span>
                </div>
                <div class="mb-2">${alertData.message}</div>
                <div class="d-flex justify-content-between align-items-center">
                    <small class="text-muted">${timeStr}</small>
                    ${alertData.action ? `<button class="btn btn-sm btn-outline-primary" onclick="handleAlertAction('new')">操作</button>` : ''}
                </div>
            `;
            
            // 插入到顶部
            container.insertBefore(alertDiv, container.firstChild);
            
            // 限制最多显示10个预警
            const alerts = container.querySelectorAll('.alert-item');
            if (alerts.length > 10) {
                alerts[alerts.length - 1].remove();
            }
            
            // 播放声音或显示通知
            if (alertData.priority >= 4) {
                showToast(alertData.title, 'warning');
            }
            
            // 更新统计数据
            updateAlertStats();
        }
        
        // 计算最优策略
        async function calculateStrategy() {
            const targetCost = document.getElementById('costSlider').value;
            document.getElementById('targetCost').textContent = `¥${targetCost}/月`;
            
            const strategyDetails = document.getElementById('strategyDetails');
            strategyDetails.innerHTML = `
                <div class="text-center py-3">
                    <div class="loading-spinner"></div>
                    <div class="text-muted mt-2">计算中...</div>
                </div>
            `;
            
            try {
                const response = await fetch('/api/strategy/calculate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        target_monthly_cost: parseFloat(targetCost),
                        max_age_months: 36,
                        min_hold_months: 12,
                        max_hold_months: 48
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    updateStrategy(result.strategy);
                    document.getElementById('monthlyCost').textContent = `¥${result.strategy.monthly_cost}`;
                    showToast('策略计算完成', 'success');
                }
            } catch (error) {
                console.error('计算策略失败:', error);
                showToast('计算策略失败', 'danger');
            }
        }
        
        // 更新策略显示
        function updateStrategy(strategy) {
            currentStrategy = strategy;
            
            const strategyDetails = document.getElementById('strategyDetails');
            const timeStr = '刚刚计算';
            
            strategyDetails.innerHTML = `
                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span>买入机龄:</span>
                        <strong>${strategy.buy_age}个月二手</strong>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span>持有时长:</span>
                        <strong>${strategy.hold_months}个月</strong>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span>买入价格:</span>
                        <strong>¥${strategy.buy_price.toLocaleString()}</strong>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span>卖出价格:</span>
                        <strong>¥${strategy.sell_price.toLocaleString()}</strong>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center">
                        <span>每月成本:</span>
                        <strong class="fs-5 ${strategy.monthly_cost <= 90 ? 'text-success' : 'text-warning'}">¥${strategy.monthly_cost.toFixed(1)}/月</strong>
                    </div>
                </div>
                <div class="text-center text-muted">
                    <small>${timeStr}</small>
                </div>
            `;
            
            document.getElementById('strategyTime').textContent = timeStr;
        }
        
        // 更新目标成本
        function updateTargetCost(value) {
            document.getElementById('targetCost').textContent = `¥${value}/月`;
        }
        
        // 启动监控
        async function startMonitoring() {
            try {
                const response = await fetch('/api/monitor/start', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    monitorActive = true;
                    document.getElementById('startMonitorBtn').disabled = true;
                    document.getElementById('stopMonitorBtn').disabled = false;
                    showToast('监控已启动', 'success');
                }
            } catch (error) {
                console.error('启动监控失败:', error);
                showToast('启动监控失败', 'danger');
            }
        }
        
        // 停止监控
        async function stopMonitoring() {
            try {
                const response = await fetch('/api/monitor/stop', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    monitorActive = false;
                    document.getElementById('startMonitorBtn').disabled = false;
                    document.getElementById('stopMonitorBtn').disabled = true;
                    showToast('监控已停止', 'warning');
                }
            } catch (error) {
                console.error('停止监控失败:', error);
                showToast('停止监控失败', 'danger');
            }
        }
        
        // 清空预警
        function clearAlerts() {
            const container = document.getElementById('alertsContainer');
            container.innerHTML = '<div class="text-center py-3 text-muted">预警已清空</div>';
            showToast('预警已清空', 'info');
        }
        
        // 显示Toast通知
        function showToast(message, type = 'info') {
            const toastId = 'toast-' + Date.now();
            const toastHtml = `
                <div id="${toastId}" class="toast custom-toast" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="toast-header bg-${type} text-white">
                        <strong class="me-auto">
                            <i class="fas fa-${getToastIcon(type)} me-2"></i>
                            iPhone监控系统
                        </strong>
                        <small>刚刚</small>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                    <div class="toast-body">
                        ${message}
                    </div>
                </div>
            `;
            
            const container = document.getElementById('toastContainer');
            container.insertAdjacentHTML('beforeend', toastHtml);
            
            const toastElement = document.getElementById(toastId);
            const toast = new bootstrap.Toast(toastElement, { delay: 3000 });
            toast.show();
            
            // 自动移除
            toastElement.addEventListener('hidden.bs.toast', function() {
                this.remove();
            });
        }
        
        // 工具函数
        function getAlertTypeClass(alertType) {
            const map = {
                '买入信号': 'buy',
                '卖出信号': 'sell',
                '成本达标': 'cost',
                '价格暴跌': 'price',
                '价格暴涨': 'price',
                '市场事件': 'price'
            };
            return map[alertType] || 'price';
        }
        
        function getPriorityBadgeClass(priority) {
            if (priority >= 5) return 'danger';
            if (priority >= 4) return 'warning';
            if (priority >= 3) return 'info';
            return 'secondary';
        }
        
        function getToastIcon(type) {
            const map = {
                'success': 'check-circle',
                'danger': 'exclamation-circle',
                'warning': 'exclamation-triangle',
                'info': 'info-circle'
            };
            return map[type] || 'info-circle';
        }
        
        // 模拟函数
        function showPriceDetails(priceId) {
            showToast(`查看价格详情 #${priceId}`, 'info');
        }
        
        function handleAlertAction(alertId) {
            showToast(`执行预警操作 #${alertId}`, 'info');
        }
        
        function updateAlertStats() {
            // 更新预警统计
            const alertCount = document.getElementById('alertCount');
            const current = parseInt(alertCount.textContent.replace(/,/g, '')) || 0;
            alertCount.textContent = (current + 1).toLocaleString();
            
            const recentAlerts = document.getElementById('recentAlerts');
            const currentRecent = parseInt(recentAlerts.textContent.replace(/,/g, '')) || 0;
            recentAlerts.textContent = (currentRecent + 1).toLocaleString();
        }
        
        function updateMonitorStatus(status) {
            // 更新监控状态
            console.log('监控状态:', status);
        }
    </script>
</body>
</html>
