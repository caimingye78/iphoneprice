name: Deploy iPhone Price Monitor

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发

jobs:
  # 测试
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r web_app/requirements.txt
        pip install pytest pytest-asyncio
    
    - name: Run tests
      run: |
        cd web_app
        python -m pytest tests/ -v
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 web_app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 web_app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # 构建
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r web_app/requirements.txt
    
    - name: Create deployment package
      run: |
        # 创建部署目录
        mkdir -p deploy
        cp -r web_app/* deploy/
        cp README.md deploy/
        cp LICENSE deploy/ 2>/dev/null || true
        
        # 创建 .renderignore
        echo "__pycache__" > deploy/.renderignore
        echo "*.pyc" >> deploy/.renderignore
        echo ".git" >> deploy/.renderignore
        echo "tests/" >> deploy/.renderignore
        
        # 创建 Procfile（Render需要）
        echo "web: uvicorn app_simple:app --host 0.0.0.0 --port \$PORT" > deploy/Procfile
        
        # 压缩部署包
        tar -czf deploy.tar.gz deploy/
        
        # 显示文件结构
        echo "📁 部署包内容:"
        find deploy/ -type f | head -20
    
    - name: Upload deployment artifact
      uses: actions/upload-artifact@v3
      with:
        name: deploy-package
        path: deploy.tar.gz

  # 部署到Render（自动）
  deploy-render:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download deployment artifact
      uses: actions/download-artifact@v3
      with:
        name: deploy-package
    
    - name: Extract deployment package
      run: tar -xzf deploy.tar.gz
    
    - name: Deploy to Render
      run: |
        echo "🚀 准备部署到Render..."
        echo "📡 访问地址: https://iphone-price-monitor.onrender.com"
        echo "📚 手动部署步骤:"
        echo "1. 访问 https://render.com"
        echo "2. 点击 'New +' -> 'Web Service'"
        echo "3. 连接你的GitHub仓库"
        echo "4. 配置:"
        echo "   - Name: iphone-price-monitor"
        echo "   - Environment: Python"
        echo "   - Build Command: pip install -r requirements.txt"
        echo "   - Start Command: uvicorn app_simple:app --host 0.0.0.0 --port \$PORT"
        echo "5. 点击 'Create Web Service'"

  # 部署到Vercel（静态前端）
  deploy-vercel:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v20
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.ORG_ID }}
        vercel-project-id: ${{ secrets.PROJECT_ID }}
        vercel-args: '--prod'
    
    - name: Get deployment URL
      run: |
        echo "🌐 Vercel部署完成!"
        echo "📡 访问地址: https://iphone-price-monitor.vercel.app"
        echo "📱 前端已部署，需要单独部署后端API"

  # 生成部署报告
  report:
    runs-on: ubuntu-latest
    needs: [deploy-render, deploy-vercel]
    if: always()
    
    steps:
    - name: Generate deployment report
      run: |
        echo "📊 部署报告" >> $GITHUB_STEP_SUMMARY
        echo "===========" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ iPhone价格监控系统部署完成!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🌐 **在线访问:**" >> $GITHUB_STEP_SUMMARY
        echo "- Render: https://iphone-price-monitor.onrender.com" >> $GITHUB_STEP_SUMMARY
        echo "- Vercel: https://iphone-price-monitor.vercel.app" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🔧 **API端点:**" >> $GITHUB_STEP_SUMMARY
        echo "- 状态检查: /api/status" >> $GITHUB_STEP_SUMMARY
        echo "- 价格数据: /api/prices" >> $GITHUB_STEP_SUMMARY
        echo "- 预警数据: /api/alerts" >> $GITHUB_STEP_SUMMARY
        echo "- 策略计算: /api/strategy/calculate" >> $GITHUB_STEP_SUMMARY
        echo "- 统计数据: /api/stats" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📱 **功能特性:**" >> $GITHUB_STEP_SUMMARY
        echo "- 实时价格监控" >> $GITHUB_STEP_SUMMARY
        echo "- 智能策略优化" >> $GITHUB_STEP_SUMMARY
        echo "- 自动预警系统" >> $GITHUB_STEP_SUMMARY
        echo "- 数据可视化图表" >> $GITHUB_STEP_SUMMARY
        echo "- WebSocket实时推送" >> $GITHUB_STEP_SUMMARY