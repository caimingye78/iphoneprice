<text x="706.0" y="312.4" font-size="11" fill="#34a853" font-weight="bold">B ¥1212</text>
<line x1="670.0" y1="118.0" x2="670.0" y2="308.4" stroke="#1a73e8" stroke-width="1.5"/>
<text x="664.0" y="213.2" font-size="11" text-anchor="end" fill="#1a73e8" font-weight="bold">B省¥1428</text>
<rect x="710" y="70" width="200" height="400" fill="#f8f9fa" stroke="#dadce0" rx="6"/>
<rect x="718" y="81" width="14" height="4" fill="#ea4335"/>
<text x="738" y="88" font-size="11.5" font-weight="bold" fill="#ea4335">路线A 先买后卖</text>
<text x="718" y="109" font-size="10" fill="#5f6368">第0月按发布价买全新</text>
<text x="718" y="126" font-size="10" fill="#5f6368">旧机并行持有,第4月卖出</text>
<text x="718" y="143" font-size="10" fill="#5f6368">→ 旧机闲置期照样贬值</text>
<text x="718" y="160" font-size="10" fill="#5f6368">→ 新机吃满首发高位折旧</text>
<rect x="718" y="173" width="14" height="4" fill="#34a853"/>
<text x="738" y="180" font-size="11.5" font-weight="bold" fill="#34a853">路线B 先卖+备用机</text>
<text x="718" y="201" font-size="10" fill="#5f6368">旧机发布前高点先卖</text>
<text x="718" y="218" font-size="10" fill="#5f6368">地板价备用机顶 6 个月</text>
<text x="718" y="235" font-size="10" fill="#5f6368">等新机回落到合理价(准新)</text>
<text x="718" y="252" font-size="10" fill="#5f6368">→ 避开双持贬值</text>
<text x="718" y="269" font-size="10" fill="#5f6368">→ 避开首发价那段陡跌</text>
<rect x="716" y="283" width="194" height="86" fill="#fff8e1" stroke="#f9ab00" rx="4"/>
<text x="722" y="297" font-size="10.5" font-weight="bold" fill="#b06000">代价（要诚实看）</text>
<text x="722" y="310" font-size="9.5" fill="#7a5300">B 在过渡的 6 个月里</text>
<text x="722" y="325" font-size="9.5" fill="#7a5300">用的是旧备用机，</text>
<text x="722" y="340" font-size="9.5" fill="#7a5300">牺牲了这段时间的</text>
<text x="722" y="355" font-size="9.5" fill="#7a5300">“最新科技”体验。</text>
<text x="722" y="370" font-size="9.5" fill="#7a5300">省钱 ⇄ 尝鲜，需自己权衡。</text>
</svg>