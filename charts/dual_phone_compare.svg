<text x="217.9" y="84.0" font-size="9.5" fill="#ea4335">A:第4月卖旧机</text>
<line x1="283.3" y1="70" x2="283.3" y2="470" stroke="#34a853" stroke-dasharray="4 4" opacity="0.5"/>
<text x="287.3" y="98.0" font-size="9.5" fill="#34a853">B:第6月买准新</text>
